baseURL: "https://huongngh.github.io/"
title: "Hương Huỳnh"
paginate: 5
theme: PaperMod
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "Hương Huỳnh"
  description: "My personal site"
  author: huongngh
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  showtoc: true
  tocopen: false
  hidemeta: true
  disableSpecial1stPost: true
  mainSections: []

  homeInfoParams:
    Title: "Hi, I'm Hương"
    Content: >
      I'm a data engineer.
      See my [projects](/projects/) →

  socialIcons:
    - name: github
      url: "https://github.com/huongngh"
    - name: email
      url: "mailto:info.huonghuynh@gmail.com"

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: reading
      name: Reading
      url: /reading/
      weight: 35
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
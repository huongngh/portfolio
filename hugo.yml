baseURL: "https://huongngh.github.io/"
title: huongngh
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: huongngh
  description: "My personal site"
  author: huongngh
  defaultTheme: auto       # auto, dark, or light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  showtoc: true
  tocopen: false

  # Home page info
  homeInfoParams:
    Title: "Hi, I'm Huong 👋"
    Content: Welcome to my personal site

  socialIcons:
    - name: github
      url: "https://github.com/huongngh"

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 50

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON   # ← required for search to work